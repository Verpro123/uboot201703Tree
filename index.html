<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>U-Boot 2017.03 思维导图 - IMX6ULL</title>
<style>
:root { --bg:#1a1a2e; --panel:#16213e; --red:#e94560; --yellow:#ffd93d; --green:#6bcb77; --blue:#4d96ff; --border:#2a2a4a; --text:#ccc; }
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* 顶栏 */
.header{background:var(--panel);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;z-index:100}
.header h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--red),#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .subtitle{font-size:12px;color:#888;margin-left:10px}
.tabs{display:flex;gap:3px}
.tab-btn{padding:7px 14px;background:#0f3460;color:#aaa;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px;transition:all 0.25s;white-space:nowrap}
.tab-btn:hover{color:#fff;border-color:var(--red)}
.tab-btn.active{background:var(--red);color:#fff;border-color:var(--red)}

/* 主区域 */
.main-container{flex:1;position:relative;overflow:hidden}
.mm-panel{display:none;width:100%;height:100%;position:absolute;top:0;left:0}
.mm-panel.active{display:block}
.mm-panel svg{width:100%;height:100%;cursor:grab}
.mm-panel svg:active{cursor:grabbing}

/* 工具栏 */
.toolbar{position:absolute;bottom:16px;right:16px;display:flex;gap:6px;z-index:50}
.tool-btn{width:36px;height:36px;border-radius:8px;background:var(--panel);border:1px solid var(--border);color:#ccc;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;backdrop-filter:blur(10px)}
.tool-btn:hover{background:var(--red);border-color:var(--red);color:#fff;transform:scale(1.08)}
.legend{position:absolute;bottom:16px;left:16px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:11px;z-index:50;backdrop-filter:blur(10px);line-height:1.7}
.legend span.dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle}
.legend .hot{background:var(--red)}.legend .warm{background:var(--yellow)}.legend .cool{background:var(--green)}.legend .info{background:var(--blue)}
.search-bar{position:absolute;top:60px;right:16px;z-index:50;display:flex;gap:5px}
.search-bar input{width:180px;padding:6px 12px;border-radius:16px;border:1px solid var(--border);background:var(--panel);color:#fff;font-size:12px;outline:none;backdrop-filter:blur(10px)}
.search-bar input:focus{border-color:var(--blue)}
.search-bar input::placeholder{color:#666}

@media(max-width:768px){.header{flex-direction:column;gap:6px;padding:6px 10px}.header h1{font-size:16px}.tabs{flex-wrap:wrap;justify-content:center}.tab-btn{padding:5px 10px;font-size:11px}}
</style>
</head>
<body>

<div class="header">
  <div><h1>U-Boot 2017.03 源码架构思维导图</h1><span class="subtitle">IMX6ULL Pro · ARMv7 Cortex-A7</span></div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchMap(0)">完整目录架构</button>
    <button class="tab-btn" onclick="switchMap(1)">启动流程核心链</button>
    <button class="tab-btn" onclick="switchMap(2)">功能模块依赖</button>
    <button class="tab-btn" onclick="switchMap(3)">驱动层展开</button>

</div>

// ==================== 渲染引擎 ====================
const allTrees = [tree0, tree1, tree2, tree3, tree4];
let currentPanel = 0;
let svgElements = [];
let panData = []; // { svg, viewBox:{x,y,w,h}, isPanning, startX, startY, startVB }
let zoomLevels = [1,1,1,1,1];

const NODE_H = 30, NODE_PAD_X = 20, NODE_PAD_Y = 8, LEVEL_GAP = 360;
const FONT_SIZE = 13, LEAF_FONT = 11;

function initPanels() {
  const container = document.getElementById('mainContainer');
  for (let i = 0; i < 5; i++) {
    const panel = document.createElement('div');
    panel.className = 'mm-panel' + (i === 0 ? ' active' : '');
    panel.id = 'panel-' + i;
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    svg.innerHTML = '<defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><g class="viewport" transform="translate(0,0)"></g>';
    panel.appendChild(svg);
    container.appendChild(panel);
    svgElements.push(svg);
    panData.push({ svg, viewBox:{x:0,y:0,w:0,h:0}, isPanning:false, startX:0, startY:0, startVBX:0, startVBY:0, _g:svg.querySelector('.viewport') });
    setupPanZoom(svg, i);
  }
}

function setupPanZoom(svg, idx) {
  const pd = panData[idx];
  // 滚轮 = 上下翻页（Ctrl+滚轮 = 缩放）
  svg.addEventListener('wheel', e => {
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      const factor = e.deltaY < 0 ? 1.15 : 0.85;
      zoomLevels[idx] = Math.min(Math.max(zoomLevels[idx] * factor, 0.15), 4);
      applyZoom(idx, e.offsetX, e.offsetY, factor);
    } else {
      e.preventDefault();
      const speed = 200;
      pd.viewBox.y += e.deltaY < 0 ? speed : -speed;
      if (pd._g) pd._g.setAttribute('transform', `translate(${pd.viewBox.x},${pd.viewBox.y}) scale(${zoomLevels[idx]})`);
    }
  }, {passive:false});
  svg.addEventListener('mousedown', e => {
    pd.isPanning = true;
    pd.startX = e.clientX;
    pd.startY = e.clientY;
    pd.startVBX = pd.viewBox.x;
    pd.startVBY = pd.viewBox.y;
    svg.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', e => {
    if (!pd.isPanning) return;
    const dx = (e.clientX - pd.startX) * 3;
    const dy = (e.clientY - pd.startY) * 3;
    pd.viewBox.x = pd.startVBX + dx;
    pd.viewBox.y = pd.startVBY + dy;
    if (pd._g) pd._g.setAttribute('transform', `translate(${pd.viewBox.x},${pd.viewBox.y}) scale(${zoomLevels[idx]})`);
  });
  window.addEventListener('mouseup', () => {
    if (pd.isPanning) { pd.isPanning = false; svg.style.cursor = 'grab'; }
  });
  svg.addEventListener('dblclick', e => {
    const rect = svg.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / zoomLevels[idx];
    const my = (e.clientY - rect.top) / zoomLevels[idx];
    zoomLevels[idx] = Math.min(zoomLevels[idx] * 1.4, 4);
    pd.viewBox.x = pd.viewBox.x - mx * 0.4;
    pd.viewBox.y = pd.viewBox.y - my * 0.4;
    if (pd._g) pd._g.setAttribute('transform', `translate(${pd.viewBox.x},${pd.viewBox.y}) scale(${zoomLevels[idx]})`);
  });
}

function applyZoom(idx, mx, my, factor) {
  const pd = panData[idx];
  pd.viewBox.x = pd.viewBox.x - mx * (factor - 1) / zoomLevels[idx];
  pd.viewBox.y = pd.viewBox.y - my * (factor - 1) / zoomLevels[idx];
  if (pd._g) pd._g.setAttribute('transform', `translate(${pd.viewBox.x},${pd.viewBox.y}) scale(${zoomLevels[idx]})`);
}

function zoomAll(factor) {
  const idx = currentPanel;
  zoomLevels[idx] = Math.min(Math.max(zoomLevels[idx] * factor, 0.15), 4);
  const pd = panData[idx];
  const svg = pd.svg;
  const rect = svg.getBoundingClientRect();
  applyZoom(idx, rect.width/2, rect.height/2, factor);
}

function fitAll() {
  const idx = currentPanel;
  zoomLevels[idx] = 1;
  const pd = panData[idx];
  pd.viewBox.x = 0; pd.viewBox.y = 0;
  if (pd._g) pd._g.setAttribute('transform', 'translate(0,0) scale(1)');
}

// ==================== 树布局计算 ====================
let _measureCanvas, _measureCtx;
function getMeasureCtx() {
  if (!_measureCanvas) { _measureCanvas = document.createElement('canvas'); _measureCtx = _measureCanvas.getContext('2d'); }
  return _measureCtx;
}
function measureText(label, fontSize) {
  const lines = label.split('\n');
  let maxW = 0;
  const ctx = getMeasureCtx();
  ctx.font = `bold ${fontSize}px "Microsoft YaHei","Segoe UI",sans-serif`;
  for (const l of lines) maxW = Math.max(maxW, ctx.measureText(l).width);
  return { w: maxW + NODE_PAD_X * 2, h: lines.length * (fontSize + 2) + NODE_PAD_Y * 2, lines };
}

function calcLayout(node, depth, isLeaf) {
  const fSize = isLeaf ? LEAF_FONT : FONT_SIZE;
  const m = measureText(node.label || '', fSize);
  node._w = Math.max(m.w, 140);
  node._h = Math.max(m.h, NODE_H);
  node._depth = depth;
  node._children = [];
  node._totalH = node._h + 8;

  if (node.children && node.children.length > 0) {
    for (const ch of node.children) {
      node._children.push(ch);
      calcLayout(ch, depth + 1, !ch.children || ch.children.length === 0);
    }
    if (node._children.length === 1) {
      node._totalH = node._children[0]._totalH + 10;
    } else {
      let sum = 0;
      for (const ch of node._children) sum += ch._totalH;
      node._totalH = sum + (node._children.length - 1) * 4;
    }
  }
}

function assignY(node, startY) {
  node._y = startY + node._totalH / 2 - node._h / 2;
  if (node._children.length > 0) {
    let cy = startY;
    for (const ch of node._children) {
      assignY(ch, cy);
      cy += ch._totalH + 4;
    }
  }
}

function runLayout(root) {
  calcLayout(root, 0, false);
  assignY(root, 20);
  let maxRight = 0;
  function walk(n) {
    const right = (n._depth) * LEVEL_GAP + n._w;
    maxRight = Math.max(maxRight, right);
    if (n._children) for (const c of n._children) walk(c);
  }
  walk(root);
  return { totalW: maxRight + 80, totalH: root._totalH + 40 };
}

// ==================== SVG 渲染（字符串拼接，一次写入） ====================
function escapeXml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function buildNodeHtml(node, parentX, parentY, parentH) {
  const x = node._depth * LEVEL_GAP + 30;
  const y = node._y;
  const w = node._w, h = node._h;
  const isRoot = node._depth === 0;
  const fSize = (!node.children || node.children.length === 0) ? LEAF_FONT : FONT_SIZE;
  const measured = measureText(node.label || '', fSize);
  const lines = measured.lines;
  const lineH = fSize + 2;
  const theme = COLORS[node.color] || COLORS.teal;

  let html = '';

  // 连线
  if (!isRoot && parentX !== undefined) {
    const px = parentX, py = parentY + parentH / 2;
    const cx1 = px + (x - px) * 0.45;
    const cx2 = px + (x - px) * 0.55;
    html += `<path d="M${px} ${py} C${cx1} ${py} ${cx2} ${y+h/2} ${x} ${y+h/2}" stroke="#3a3a5a" stroke-width="1.5" fill="none"/>`;
  }

  // 节点背景
  if (isRoot) {
    html += `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="22" ry="22" fill="url(#rootGrad)" filter="url(#glow)"/>`;
  } else {
    const sw = node.focus ? '2' : '1';
    html += `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="14" ry="14" fill="${theme[2]}" stroke="${theme[0]}" stroke-width="${sw}"/>`;
  }

  // 文字
  const txtColor = isRoot ? '#fff' : (node.focus ? '#fff' : '#ddd');
  for (let li = 0; li < lines.length; li++) {
    html += `<text x="${x + w/2}" y="${y + NODE_PAD_Y + fSize + li * lineH}" text-anchor="middle" fill="${txtColor}" font-size="${fSize}" font-weight="${isRoot ? 'bold' : (node.focus ? '600' : 'normal')}" font-family="Microsoft YaHei,Segoe UI,sans-serif" style="pointer-events:none;user-select:none">${escapeXml(lines[li])}</text>`;
  }

  // 递归子节点（始终展开，无折叠）
  if (node.children) {
    for (const ch of node.children) {
      html += buildNodeHtml(ch, x + w, y, h);
    }
  }

  return html;
}

function renderTree(svg, rootNode, idx) {
  const layout = runLayout(rootNode);
  panData[idx].viewBox.w = layout.totalW;
  panData[idx].viewBox.h = layout.totalH;

  // 构建 SVG 字符串
  let inner = `<rect class="mm-bg" width="${layout.totalW}" height="${layout.totalH}" fill="transparent"/>`;
  inner += buildNodeHtml(rootNode);

  const g = svg.querySelector('.viewport');
  g.innerHTML = `<defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter><linearGradient id="rootGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e94560"/><stop offset="100%" stop-color="#c0392b"/></linearGradient></defs>` + inner;
  panData[idx]._g = g;

  svg.setAttribute('viewBox', `0 0 ${layout.totalW} ${layout.totalH}`);
  panData[idx]._g.setAttribute('transform', `translate(${panData[idx].viewBox.x},${panData[idx].viewBox.y}) scale(${zoomLevels[idx]})`);
}

// ==================== 面板切换 ====================
function switchMap(index) {
  currentPanel = index;
  document.querySelectorAll('.mm-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + index).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===index));
  renderTree(svgElements[index], allTrees[index], index);
}

// ==================== 全局工具 ====================
function expandAll() {
  const root = allTrees[currentPanel];
  function expand(n, depth) {
    if (depth <= 2) n._collapsed = false;
    else n._collapsed = true;
    if (n.children) for (const c of n.children) expand(c, depth+1);
  }
  expand(root, 0);
  renderTree(svgElements[currentPanel], root, currentPanel);
}

function collapseAll() {
  const root = allTrees[currentPanel];
  function collapse(n, depth) {
    n._collapsed = depth >= 1;
    if (n.children) for (const c of n.children) collapse(c, depth+1);
  }
  collapse(root, 0);
  root._collapsed = false;
  renderTree(svgElements[currentPanel], root, currentPanel);
}

function searchNodes() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) return;
  const root = allTrees[currentPanel];
  // 展开所有匹配节点的祖先
  function search(n) {
    let found = false;
    if (n.label && n.label.toLowerCase().includes(q)) found = true;
    if (n.children) {
      for (const c of n.children) {
        if (search(c)) { found = true; n._collapsed = false; }
      }
    }
    return found;
  }
  root._collapsed = false;
  for (const c of (root.children||[])) {
    if (search(c)) c._collapsed = false;
  }
  renderTree(svgElements[currentPanel], root, currentPanel);
}

// ==================== 键盘快捷键 ====================
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch(e.key) {
    case '1': switchMap(0); break;
    case '2': switchMap(1); break;
    case '3': switchMap(2); break;
    case '4': switchMap(3); break;
    case '5': switchMap(4); break;
    case 'f': fitAll(); break;
    case '0': fitAll(); break;
  }
});

// ==================== 启动 ====================
initPanels();
renderTree(svgElements[0], allTrees[0], 0);
